networks:
    loki:

services:
    db:
        image: postgres:latest
        ports:
            - '5432:5432'
        environment:
            - POSTGRES_USER=${APP_DB_USER}
            - POSTGRES_PASSWORD=${APP_DB_PASSWORD}
            - POSTGRES_DB=${APP_DB}

    deno-pim:
        image: deno-pim
        ports:
            - '${APP_PORT}:3000'
        environment:
            - APP_PORT=${APP_PORT}
            - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
            - ACCESS_TOKEN_PRIVATE=${ACCESS_TOKEN_PRIVATE}
            - ACCESS_TOKEN_EXPIRES_IN=${ACCESS_TOKEN_EXPIRES_IN}
            - REFRESH_TOKEN_EXPIRES_IN=${REFRESH_TOKEN_EXPIRES_IN}
            - DENO_TRACE_PERMISSIONS=${DENO_TRACE_PERMISSIONS}
            - NODE_ENV=production
        networks:
            - loki

    loki:
        image: grafana/loki:3.7.0
        ports:
            - '3100:3100'
        command: -config.file=/mnt/config/config.yaml
        volumes:
            - ./third-party/loki/config.yaml:/mnt/config/config.yaml:Z
        networks:
            - loki

    grafana:
        environment:
            - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
            - GF_AUTH_ANONYMOUS_ENABLED=true
            - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
        entrypoint:
            - sh
            - -euc
            - |
                  mkdir -p /etc/grafana/provisioning/datasources
                  cat <<EOF > /etc/grafana/provisioning/datasources/ds.yaml
                  apiVersion: 1
                  datasources:
                    - name: Loki
                      type: loki
                      access: proxy
                      orgId: 1
                      url: http://loki:3100
                      basicAuth: false
                      isDefault: true
                      version: 1
                      editable: false
                  EOF
                  /run.sh
        image: grafana/grafana:latest
        ports:
            - '3001:3000'
        networks:
            - loki
        depends_on:
            - loki

    otel-collector:
        image: otel/opentelemetry-collector-contrib:latest
        command: ['--config=/etc/otel-collector-config.yaml']
        volumes:
            - ./third-party/otel-collector/config.yaml:/etc/otel-collector-config.yaml:Z
            - /tmp/test-logs:/etc/test-logs:Z
        ports:
            - '4317:4317' # OTLP gRPC receiver
            - '4318:4318' # OTLP HTTP receiver
        networks:
            - loki
        depends_on:
            - loki
